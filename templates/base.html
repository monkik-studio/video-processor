<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Video Format Studio{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar app-navbar sticky-top">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand app-brand" href="{{ url_for('index') }}">
        <span class="brand-mark">VF</span>
        <span>VideoFlow</span>
      </a>
      <div class="nav-meta d-none d-md-flex">
        <span>Batch exports</span>
        <span>H.264</span>
        <span>FFmpeg</span>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <div class="container-fluid px-3 px-lg-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} mb-2" role="alert">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
